name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fetch full history and tags
        run: |
          git fetch --force --tags --prune --unshallow || true
          git fetch --force --tags --prune

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify build
        run: npm run build

      - name: Verify distribution bundle
        run: npm run dist

      - name: Ensure dist is committed
        run: git diff --exit-code dist

      - name: Resolve release version and tag
        id: release_meta
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ -z "$version" ]; then
            echo "Could not resolve version from package.json"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag does not already exist
        run: |
          tag="${{ steps.release_meta.outputs.tag }}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
