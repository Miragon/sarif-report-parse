name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout selected tag for manual run
        if: github.event_name == 'workflow_dispatch'
        run: git checkout ${{ inputs.tag }}

      - name: Fetch full history and tags
        run: |
          git fetch --force --tags --prune --unshallow || true
          git fetch --force --tags --prune

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify build
        run: npm run build

      - name: Verify distribution bundle
        run: npm run dist

      - name: Ensure dist is committed
        run: git diff --exit-code dist

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          generate_release_notes: true
